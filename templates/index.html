<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hookah Mixes</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;--bg4:#222233;
--text:#e8e6f0;--text2:#9896a8;--text3:#5c5a6e;
--accent:#c084fc;--accent2:#a855f7;--accent3:#7c3aed;
--green:#34d399;--amber:#fbbf24;--red:#f87171;--blue:#60a5fa;
--coral:#fb923c;--teal:#2dd4bf;
--radius:16px;--radius-sm:10px;
}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden}
.grain{position:fixed;inset:0;pointer-events:none;opacity:0.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:9999}
.glow-orb{position:fixed;width:600px;height:600px;border-radius:50%;filter:blur(120px);opacity:0.07;pointer-events:none;z-index:0}
.glow-orb.purple{background:#a855f7;top:-200px;right:-200px}
.glow-orb.teal{background:#2dd4bf;bottom:-200px;left:-200px}
header{position:relative;z-index:1;padding:3rem 2rem 2rem;text-align:center}
header h1{font-size:clamp(2rem,5vw,3.2rem);font-weight:700;letter-spacing:-1px;background:linear-gradient(135deg,#e8e6f0 0%,#c084fc 50%,#2dd4bf 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:0.5rem}
header p{color:var(--text2);font-size:1rem;font-weight:300}

/* ── NAV ── */
.nav-tabs{display:flex;gap:8px;justify-content:center;padding:1.5rem 2rem 0;flex-wrap:wrap}
.nav-tab{padding:10px 28px;border:1px solid rgba(255,255,255,0.1);border-radius:50px;background:transparent;color:var(--text2);font-family:inherit;font-size:0.9rem;font-weight:500;cursor:pointer;transition:all 0.3s}
.nav-tab.active{background:var(--accent3);border-color:var(--accent);color:#fff}
/* random & edit buttons in nav row */
.nav-random{padding:10px 22px;border:1px solid rgba(251,191,36,0.3);border-radius:50px;background:rgba(251,191,36,0.08);color:var(--amber);font-family:inherit;font-size:0.9rem;font-weight:600;cursor:pointer;transition:all 0.3s;display:flex;align-items:center;gap:6px}
.nav-random:hover{background:rgba(251,191,36,0.18);border-color:var(--amber);transform:scale(1.04)}
.nav-random:active{transform:scale(0.97)}
.nav-edit{padding:10px 18px;border:1px solid rgba(255,255,255,0.1);border-radius:50px;background:transparent;color:var(--text2);font-family:inherit;font-size:0.85rem;font-weight:500;cursor:pointer;transition:all 0.3s}
.nav-edit:hover{border-color:var(--teal);color:var(--teal)}
.nav-edit.active{background:rgba(45,212,191,0.12);border-color:var(--teal);color:var(--teal)}

/* ── EDIT-MODE BANNER ── */
.edit-banner{display:none;position:sticky;top:0;z-index:101;background:rgba(45,212,191,0.1);border-bottom:1px solid rgba(45,212,191,0.25);backdrop-filter:blur(16px);padding:0.65rem 1.5rem;text-align:center;font-size:0.88rem;color:var(--teal);gap:12px;align-items:center;justify-content:center;flex-wrap:wrap}
.edit-banner.show{display:flex}
.edit-banner strong{color:#fff}
.edit-done{padding:7px 20px;border:1px solid var(--teal);border-radius:50px;background:var(--teal);color:#000;font-family:inherit;font-size:0.82rem;font-weight:700;cursor:pointer;transition:all 0.2s}
.edit-done:hover{background:#20c4b0}
.edit-select-all{padding:7px 16px;border:1px solid rgba(45,212,191,0.4);border-radius:50px;background:transparent;color:var(--teal);font-family:inherit;font-size:0.82rem;cursor:pointer;transition:all 0.2s}
.edit-select-all:hover{background:rgba(45,212,191,0.1)}

/* ── CONTROLS — two fixed rows ── */
.controls{position:sticky;top:0;z-index:100;background:rgba(10,10,15,0.85);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.05);padding:0.75rem 2rem;display:flex;flex-direction:column;gap:8px;align-items:center}
.controls-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center;width:100%}
.controls-row-strength{flex-wrap:nowrap;justify-content:center}
.bowl-btn{padding:10px 20px;border:1px solid rgba(255,255,255,0.1);border-radius:50px;background:transparent;color:var(--text2);font-family:inherit;font-size:0.85rem;font-weight:500;cursor:pointer;transition:all 0.3s}
.bowl-btn:hover{border-color:var(--accent);color:var(--accent)}
.bowl-btn.active{background:var(--accent3);border-color:var(--accent);color:#fff}
.str-btn{padding:8px 14px;border:1px solid rgba(255,255,255,0.1);border-radius:50px;background:transparent;color:var(--text2);font-family:inherit;font-size:0.82rem;font-weight:500;cursor:pointer;transition:all 0.3s;white-space:nowrap}
.str-btn:hover{border-color:var(--accent);color:var(--accent)}
.str-btn.active{background:var(--accent3);border-color:var(--accent);color:#fff}
.strength-badge{font-size:0.72rem;padding:2px 8px;border-radius:50px;font-weight:500}
.str-лёгкий{background:rgba(52,211,153,0.15);color:#6ee7b7}
.str-средний{background:rgba(251,191,36,0.15);color:#fde68a}
.str-крепкий{background:rgba(248,113,113,0.15);color:#fca5a5}
.cat-filter{padding:8px 16px;border:1px solid rgba(255,255,255,0.06);border-radius:50px;background:var(--bg2);color:var(--text2);font-family:inherit;font-size:0.8rem;cursor:pointer;transition:all 0.3s}
.cat-filter:hover,.cat-filter.active{background:var(--bg4);color:var(--text);border-color:rgba(255,255,255,0.15)}

/* ── GRID & CARDS ── */
.grid{position:relative;z-index:1;max-width:1200px;margin:2rem auto;padding:0 1.5rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px}
.card{background:var(--bg2);border:1px solid rgba(255,255,255,0.06);border-radius:var(--radius);overflow:hidden;transition:all 0.3s;cursor:pointer;position:relative}
.card:hover{border-color:rgba(192,132,252,0.3);transform:translateY(-2px);box-shadow:0 8px 32px rgba(168,85,247,0.08)}
/* unavailable state */
.card.unavailable{opacity:0.38;filter:grayscale(0.7)}
.card.unavailable:hover{transform:none;box-shadow:none}
/* edit mode: all cards clickable to toggle */
body.edit-mode .card{cursor:pointer}
body.edit-mode .card:hover{border-color:rgba(45,212,191,0.4);transform:translateY(-1px)}
/* availability toggle overlay */
.avail-toggle{display:none;position:absolute;top:10px;left:10px;z-index:10;width:28px;height:28px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);background:var(--bg3);align-items:center;justify-content:center;font-size:0.9rem;transition:all 0.2s;pointer-events:none}
body.edit-mode .avail-toggle{display:flex}
.card:not(.unavailable) .avail-toggle{background:var(--teal);border-color:var(--teal);color:#000}
.card.unavailable .avail-toggle{background:var(--bg3);border-color:rgba(255,255,255,0.15);color:var(--text3)}

.card-header{padding:1.25rem 1.25rem 0.75rem;display:flex;justify-content:space-between;align-items:flex-start}
.card-title{font-size:1.1rem;font-weight:600;letter-spacing:-0.3px}
.card-cat{font-size:0.7rem;font-weight:500;padding:4px 10px;border-radius:50px;letter-spacing:0.5px;text-transform:uppercase}
.cat-ягодные{background:rgba(248,113,113,0.15);color:#fca5a5}
.cat-тропические{background:rgba(251,191,36,0.15);color:#fde68a}
.cat-свежие{background:rgba(45,212,191,0.15);color:#99f6e4}
.cat-газировки{background:rgba(96,165,250,0.15);color:#bfdbfe}
.cat-десертные{background:rgba(251,146,60,0.15);color:#fed7aa}
.cat-цитрусовые{background:rgba(192,132,252,0.15);color:#ddd6fe}
.cat-дынно-арбузные{background:rgba(52,211,153,0.15);color:#a7f3d0}
.card-desc{padding:0 1.25rem;color:var(--text2);font-size:0.85rem;font-weight:300}
.card-items{padding:1rem 1.25rem}
.item-row{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:0.82rem}
.item-pct{min-width:32px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:var(--text2)}
.item-bar{height:6px;border-radius:3px;transition:width 0.5s}
.item-name{flex:1;color:var(--text)}
.item-brand{font-size:0.7rem;color:var(--text3);margin-left:4px}
.item-grams{min-width:36px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:var(--accent)}
.total-badge{font-family:'JetBrains Mono',monospace;font-size:0.78rem;color:var(--teal);padding:0.6rem 1.25rem;background:rgba(45,212,191,0.05);border-top:1px solid rgba(255,255,255,0.04)}
.coal-badge{font-size:0.78rem;color:var(--amber);padding:0.5rem 1.25rem;background:rgba(251,191,36,0.05);border-top:1px solid rgba(255,255,255,0.03);display:flex;gap:6px;align-items:flex-start;line-height:1.4}
.coal-badge .coal-icon{flex-shrink:0;font-size:0.85rem}
.pack-badge{font-size:0.78rem;color:#a5b4fc;padding:0.5rem 1.25rem;background:rgba(165,180,252,0.05);border-top:1px solid rgba(255,255,255,0.03);display:flex;gap:6px;align-items:center;line-height:1.4}
.pack-badge .pack-icon{flex-shrink:0;font-size:0.85rem}
.card-footer{padding:0.75rem 1.25rem;border-top:1px solid rgba(255,255,255,0.04);display:flex;justify-content:space-between;align-items:center}
.bowl-rec{display:flex;align-items:center;gap:6px;font-size:0.78rem;color:var(--text2)}
.bowl-rec .dot{width:8px;height:8px;border-radius:50%}
.bowl-rec .dot.убивашка{background:var(--coral)}
.bowl-rec .dot.фанел{background:var(--teal)}
.rating-display{display:flex;align-items:center;gap:4px;font-size:0.8rem}
.star{color:var(--amber)}
.review-count{color:var(--text3);font-size:0.75rem}

/* ── RANDOM SPLASH ── */
.random-splash{display:none;position:fixed;inset:0;z-index:250;background:rgba(0,0,0,0.75);backdrop-filter:blur(10px);justify-content:center;align-items:center;padding:1rem}
.random-splash.show{display:flex}
.random-card{background:var(--bg2);border:1px solid rgba(192,132,252,0.35);border-radius:var(--radius);padding:2rem;max-width:380px;width:100%;text-align:center;position:relative;animation:popIn 0.35s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes popIn{from{transform:scale(0.7);opacity:0}to{transform:scale(1);opacity:1}}
.random-dice{font-size:3rem;margin-bottom:0.75rem;display:block;animation:spin 0.4s ease-out}
@keyframes spin{from{transform:rotate(-180deg) scale(0)}to{transform:rotate(0deg) scale(1)}}
.random-card h2{font-size:1.5rem;font-weight:700;margin-bottom:0.3rem;letter-spacing:-0.5px}
.random-card .r-cat{font-size:0.75rem;margin-bottom:0.6rem;display:inline-block}
.random-card .r-strength{font-size:0.85rem;margin-bottom:1rem}
.random-card .r-desc{color:var(--text2);font-size:0.88rem;margin-bottom:1.5rem;line-height:1.5}
.random-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.r-open{padding:11px 24px;background:linear-gradient(135deg,var(--accent3),var(--accent2));border:none;border-radius:50px;color:#fff;font-family:inherit;font-size:0.9rem;font-weight:600;cursor:pointer;transition:all 0.2s}
.r-open:hover{transform:scale(1.04);box-shadow:0 4px 20px rgba(168,85,247,0.35)}
.r-reroll{padding:11px 20px;background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.3);border-radius:50px;color:var(--amber);font-family:inherit;font-size:0.9rem;font-weight:600;cursor:pointer;transition:all 0.2s}
.r-reroll:hover{background:rgba(251,191,36,0.2)}
.r-close{padding:11px 16px;background:var(--bg3);border:1px solid rgba(255,255,255,0.08);border-radius:50px;color:var(--text2);font-family:inherit;font-size:0.9rem;cursor:pointer;transition:all 0.2s}
.r-close:hover{background:var(--bg4)}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);z-index:200;justify-content:center;align-items:center;padding:1rem}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;position:relative}
.modal-close{position:absolute;top:1rem;right:1rem;background:var(--bg3);border:none;color:var(--text2);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:all 0.2s;z-index:1}
.modal-close:hover{background:var(--bg4);color:var(--text)}
.modal-header{padding:1.5rem 1.5rem 1rem}
.modal-header h2{font-size:1.4rem;font-weight:600;letter-spacing:-0.5px}
.modal-header p{color:var(--text2);font-size:0.9rem;margin-top:4px}
.modal-bowl-note{margin:0 1.5rem;padding:1rem;background:var(--bg3);border-radius:var(--radius-sm);border-left:3px solid var(--accent);font-size:0.85rem;color:var(--text2);line-height:1.5}
.modal-coal-tip{margin:0.75rem 1.5rem 0;padding:1rem;background:rgba(251,191,36,0.06);border-radius:var(--radius-sm);border-left:3px solid var(--amber);font-size:0.85rem;color:var(--text2);line-height:1.6}
.modal-coal-tip .coal-title{font-weight:600;color:var(--amber);font-size:0.82rem;letter-spacing:0.3px;margin-bottom:6px;text-transform:uppercase}
.coal-row{display:flex;gap:8px;align-items:center;margin-bottom:4px}
.coal-row:last-child{margin-bottom:0}
.coal-label{color:var(--text3);font-size:0.8rem;min-width:70px}
.coal-val{color:var(--text);font-size:0.85rem;font-weight:500}
.modal-items{padding:1rem 1.5rem}
.modal-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.03)}
.modal-item:last-child{border-bottom:none}
.modal-item .pct{min-width:40px;font-family:'JetBrains Mono',monospace;font-size:0.9rem;font-weight:500;text-align:right}
.modal-item .bar{width:60px;height:8px;border-radius:4px}
.modal-item .info{flex:1}
.modal-item .tname{font-weight:500;font-size:0.95rem}
.modal-item .tbrand{font-size:0.78rem;color:var(--text3)}
.modal-item .grams{font-family:'JetBrains Mono',monospace;font-size:0.9rem;color:var(--accent);min-width:48px;text-align:right}
.review-section{padding:1.5rem;border-top:1px solid rgba(255,255,255,0.05)}
.review-section h3{font-size:1rem;font-weight:600;margin-bottom:1rem}
.review-form{display:flex;flex-direction:column;gap:12px}
.form-row{display:flex;gap:12px;flex-wrap:wrap}
.bowl-select{display:flex;gap:8px}
.bowl-opt{padding:8px 16px;border:1px solid rgba(255,255,255,0.1);border-radius:50px;background:transparent;color:var(--text2);font-family:inherit;font-size:0.82rem;cursor:pointer;transition:all 0.2s}
.bowl-opt:hover{border-color:var(--accent)}
.bowl-opt.selected{background:var(--accent3);border-color:var(--accent);color:#fff}
.stars-input{display:flex;gap:4px}
.stars-input span{font-size:1.5rem;cursor:pointer;color:var(--text3);transition:color 0.15s;user-select:none}
.stars-input span.lit{color:var(--amber)}
textarea{width:100%;padding:12px;background:var(--bg3);border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:0.9rem;resize:vertical;min-height:80px;outline:none;transition:border-color 0.2s}
textarea:focus{border-color:var(--accent)}
textarea::placeholder{color:var(--text3)}
.submit-btn{padding:12px 24px;background:linear-gradient(135deg,var(--accent3),var(--accent2));border:none;border-radius:50px;color:#fff;font-family:inherit;font-size:0.9rem;font-weight:600;cursor:pointer;transition:all 0.2s;align-self:flex-start}
.submit-btn:hover{transform:scale(1.02);box-shadow:0 4px 20px rgba(168,85,247,0.3)}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.existing-reviews{margin-top:1.5rem;display:flex;flex-direction:column;gap:10px}
.rev-card{background:var(--bg3);border-radius:var(--radius-sm);padding:1rem}
.rev-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.rev-bowl{font-size:0.75rem;padding:3px 10px;border-radius:50px;font-weight:500}
.rev-bowl.убивашка{background:rgba(251,146,60,0.15);color:#fed7aa}
.rev-bowl.фанел{background:rgba(45,212,191,0.15);color:#99f6e4}
.rev-date{font-size:0.75rem;color:var(--text3)}
.rev-stars{color:var(--amber);font-size:0.85rem;margin-bottom:4px}
.rev-comment{font-size:0.85rem;color:var(--text2);line-height:1.5}

/* ── TOAST ── */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(100px);background:var(--green);color:#000;padding:12px 24px;border-radius:50px;font-weight:600;font-size:0.9rem;z-index:300;transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ── CALENDAR ── */
#calPage{display:none;max-width:1100px;margin:2rem auto;padding:0 1.5rem}
.cal-nav{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:1.5rem}
.cal-nav button{background:var(--bg3);border:1px solid rgba(255,255,255,0.08);color:var(--text);width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1.1rem;transition:all 0.2s}
.cal-nav button:hover{background:var(--bg4);border-color:var(--accent)}
.cal-month{font-size:1.3rem;font-weight:600;min-width:180px;text-align:center;letter-spacing:-0.3px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal-dow{text-align:center;font-size:0.72rem;color:var(--text3);padding:6px 0;font-weight:500;text-transform:uppercase;letter-spacing:0.5px}
.cal-cell{min-height:90px;background:var(--bg2);border:1px solid rgba(255,255,255,0.04);border-radius:10px;padding:6px;position:relative;transition:border-color 0.2s}
.cal-cell.other-month{opacity:0.3}
.cal-cell.today{border-color:rgba(192,132,252,0.4)}
.cal-cell.has-entry{border-color:rgba(192,132,252,0.2);background:var(--bg3)}
.cal-day-num{font-size:0.75rem;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-bottom:4px}
.cal-entry{background:var(--accent3);border-radius:6px;padding:4px 6px;margin-bottom:3px;cursor:pointer;transition:opacity 0.2s}
.cal-entry:hover{opacity:0.8}
.cal-entry-name{font-size:0.72rem;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-entry-meta{font-size:0.65rem;color:rgba(255,255,255,0.7);display:flex;gap:4px;align-items:center}
@media(max-width:600px){
  .grid{grid-template-columns:1fr}
  .controls{padding:0.5rem 1rem}
  .cal-cell{min-height:60px}
  .cal-entry-meta{display:none}
  .nav-tabs{gap:6px}
  .nav-random{padding:9px 16px;font-size:0.82rem}
}
</style>
</head>
<body>
<div class="grain"></div>
<div class="glow-orb purple"></div>
<div class="glow-orb teal"></div>

<header>
<h1>Hookah Mixes</h1>
<p>16 авторских миксов из твоей коллекции табаков</p>
</header>

<div class="nav-tabs">
  <button class="nav-tab active" onclick="showPage('mixes',this)">🌿 Миксы</button>
  <button class="nav-tab" onclick="showPage('calendar',this)">📅 Календарь</button>
  <button class="nav-random" id="randBtn" onclick="rollRandom()">🎲 Рандом <span id="randCount" style="font-size:0.75rem;opacity:0.7"></span></button>
  <button class="nav-edit" id="editBtn" onclick="toggleEditMode()">✏️ Мои миксы</button>
</div>

<!-- Edit mode banner -->
<div class="edit-banner" id="editBanner">
  <span>Нажми на карточку, чтобы <strong>включить/выключить</strong> микс</span>
  <button class="edit-select-all" onclick="selectAllMixes()">Выбрать все</button>
  <button class="edit-done" onclick="toggleEditMode()">✓ Готово</button>
</div>

<div id="mixesPage">
<div class="controls">
  <div class="controls-row">
    <button class="bowl-btn active" onclick="setBowl(20,this)">Убивашка ~20г</button>
    <button class="bowl-btn" onclick="setBowl(15,this)">Фанел ~15г</button>
    <span style="width:1px;height:24px;background:rgba(255,255,255,0.08)"></span>
    <div id="catFilters" style="display:contents"></div>
  </div>
  <div class="controls-row controls-row-strength">
    <button class="str-btn active" onclick="setStrength('all',this)">Все</button>
    <button class="str-btn" onclick="setStrength('лёгкий',this)">🍃 Лёгкий</button>
    <button class="str-btn" onclick="setStrength('средний',this)">🔥 Средний</button>
    <button class="str-btn" onclick="setStrength('крепкий',this)">💀 Крепкий</button>
  </div>
</div>
<div class="grid" id="grid"></div>
</div>

<div id="calPage">
  <div class="cal-nav">
    <button onclick="calMove(-1)">&#8249;</button>
    <div class="cal-month" id="calMonthLabel"></div>
    <button onclick="calMove(1)">&#8250;</button>
  </div>
  <div class="cal-grid" id="calGrid"></div>
</div>

<!-- Random splash -->
<div class="random-splash" id="randomSplash" onclick="if(event.target===this)closeRandom()">
  <div class="random-card" id="randomCard">
    <span class="random-dice">🎲</span>
    <h2 id="rName"></h2>
    <span class="r-cat card-cat" id="rCat"></span>
    <div class="r-strength" id="rStrength"></div>
    <div class="r-desc" id="rDesc"></div>
    <div class="random-btns">
      <button class="r-open" onclick="openFromRandom()">Открыть микс</button>
      <button class="r-reroll" onclick="rollRandom()">🎲 Ещё раз</button>
      <button class="r-close" onclick="closeRandom()">Закрыть</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
<div class="modal" id="modal"></div>
</div>

<div class="toast" id="toast">Отзыв сохранён!</div>

<script>
const barColors=['#a855f7','#2dd4bf','#fb923c','#60a5fa','#f87171','#34d399','#fbbf24','#c084fc','#f472b6'];

function packIcon(m){
  return {компот:'🔀',секторами:'🥧',слоями:'📑','центр+края':'🎯'}[m]||'🫕';
}
function packHint(m){
  return {
    компот:'перемешай все табаки вместе',
    секторами:'раздели чашу на секторы, каждый табак в свой',
    слоями:'нежный (MH, BB) — вниз, жаростойкий (DS, HARD) — наверх',
    'центр+края':'доминант (больший %) — по краям и дну, акцент — в центр'
  }[m]||'';
}
let mixes=[],bowlSize=20,activeCat='all',activeStrength='all',selectedBowl='',selectedRating=0;
let editMode=false;
let currentRandomId=null;

// ── AVAILABILITY (localStorage) ──
function getUnavailable(){
  try{ return JSON.parse(localStorage.getItem('unavailable_mixes')||'[]'); }
  catch(e){ return []; }
}
function saveUnavailable(ids){
  localStorage.setItem('unavailable_mixes', JSON.stringify(ids));
}
function isAvailable(id){
  return !getUnavailable().includes(id);
}
function toggleAvailability(id){
  const ua=getUnavailable();
  const idx=ua.indexOf(id);
  if(idx>=0) ua.splice(idx,1); else ua.push(id);
  saveUnavailable(ua);
}
function selectAllMixes(){
  saveUnavailable([]);
  renderGrid();
  updateRandCount();
}
function getAvailableMixes(){
  const ua=getUnavailable();
  return mixes.filter(m=>!ua.includes(m.id));
}
function updateRandCount(){
  const avail=getAvailableMixes().length;
  const total=mixes.length;
  document.getElementById('randCount').textContent = avail < total ? `(${avail}/${total})` : '';
}

// ── EDIT MODE ──
function toggleEditMode(){
  editMode=!editMode;
  document.body.classList.toggle('edit-mode', editMode);
  document.getElementById('editBtn').classList.toggle('active', editMode);
  document.getElementById('editBanner').classList.toggle('show', editMode);
  renderGrid();
}

// ── LOAD ──
async function load(){
  const r=await fetch('/api/mixes');
  mixes=await r.json();
  renderFilters();
  renderGrid();
  updateRandCount();
  await loadCalendar();
}

function renderFilters(){
  const cats=[...new Set(mixes.map(m=>m.category))];
  const el=document.getElementById('catFilters');
  el.innerHTML=`<button class="cat-filter active" onclick="setCat('all',this)">Все</button>`+
    cats.map(c=>`<button class="cat-filter" onclick="setCat('${c}',this)">${c}</button>`).join('');
}

function setCat(c,el){
  activeCat=c;
  document.querySelectorAll('.cat-filter').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderGrid();
}
function setBowl(s,el){
  bowlSize=s;
  document.querySelectorAll('.bowl-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderGrid();
}
function setStrength(s,el){
  activeStrength=s;
  document.querySelectorAll('.str-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderGrid();
}

function renderGrid(){
  let filtered=activeCat==='all'?mixes:mixes.filter(m=>m.category===activeCat);
  if(activeStrength!=='all') filtered=filtered.filter(m=>m.strength===activeStrength);
  const g=document.getElementById('grid');
  const ua=getUnavailable();
  g.innerHTML=filtered.map(m=>{
    const catCls='cat-'+m.category.toLowerCase().replace(/[- ]/g,'-');
    const stars=m.avg_rating>0?'&#9733;'.repeat(Math.round(m.avg_rating)):'';
    const unavail=ua.includes(m.id);
    const coalParts=m.coal_tip?m.coal_tip.split('→'):'';
    const coalHeat=coalParts[0]?coalParts[0].trim():'';
    const coalSmoke=coalParts[1]?coalParts[1].trim():'';
    const clickAction=editMode
      ? `toggleCardAvail(${m.id},this)`
      : `openModal(${m.id})`;
    return `<div class="card${unavail?' unavailable':''}" onclick="${clickAction}">
      <div class="avail-toggle">${unavail?'✕':'✓'}</div>
      <div class="card-header">
        <div class="card-title">${m.name}</div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
          <span class="card-cat ${catCls}">${m.category}</span>
          <span class="strength-badge str-${m.strength}">${m.strength==='лёгкий'?'🍃':m.strength==='крепкий'?'💀':'🔥'} ${m.strength}</span>
        </div>
      </div>
      <div class="card-desc">${m.description}</div>
      <div class="card-items">${m.items.map((it,i)=>{
        const grams=Math.round(bowlSize*it.percentage/100*10)/10;
        return `<div class="item-row">
          <span class="item-pct">${it.percentage}%</span>
          <div class="item-bar" style="width:${it.percentage*1.2}px;background:${barColors[i%barColors.length]}"></div>
          <span class="item-name">${it.tobacco_name}<span class="item-brand">${it.brand}</span></span>
          <span class="item-grams">${grams}г</span>
        </div>`;
      }).join('')}</div>
      <div class="total-badge">Итого: ${bowlSize}г на чашу</div>
      ${m.coal_tip?`<div class="coal-badge"><span class="coal-icon">🪨</span><span>${coalHeat}${coalSmoke?' <span style="color:var(--text3)">→</span> '+coalSmoke:''}</span></div>`:''}
      ${m.pack_method?`<div class="pack-badge"><span class="pack-icon">${packIcon(m.pack_method)}</span><span><b style="color:#c7d2fe">${m.pack_method.charAt(0).toUpperCase()+m.pack_method.slice(1)}</b> — ${packHint(m.pack_method)}</span></div>`:''}
      <div class="card-footer">
        <div class="bowl-rec"><span class="dot ${m.recommended_bowl}"></span>Чаша: ${m.recommended_bowl}</div>
        <div class="rating-display">${stars?`<span class="star">${stars}</span><span class="review-count">(${m.review_count})</span>`:'<span class="review-count">нет отзывов</span>'}</div>
      </div>
    </div>`;
  }).join('');
}

function toggleCardAvail(id, cardEl){
  toggleAvailability(id);
  const ua=getUnavailable();
  const card=cardEl.closest ? cardEl : cardEl;
  // find the card element
  const cards=document.querySelectorAll('.card');
  cards.forEach(c=>{
    const onclick=c.getAttribute('onclick')||'';
    if(onclick.includes(`toggleCardAvail(${id},`)){
      const unavail=ua.includes(id);
      c.classList.toggle('unavailable', unavail);
      const toggle=c.querySelector('.avail-toggle');
      if(toggle) toggle.textContent=unavail?'✕':'✓';
    }
  });
  updateRandCount();
}

// ── RANDOM ──
function rollRandom(){
  const avail=getAvailableMixes();
  if(!avail.length){
    alert('Нет доступных миксов! Включи хотя бы один в «Мои миксы».');
    return;
  }
  const m=avail[Math.floor(Math.random()*avail.length)];
  currentRandomId=m.id;
  const catCls='cat-'+m.category.toLowerCase().replace(/[- ]/g,'-');
  // animate dice
  const dice=document.querySelector('.random-dice');
  if(dice){dice.style.animation='none';void dice.offsetWidth;dice.style.animation='spin 0.4s ease-out';}
  // animate card
  const rc=document.getElementById('randomCard');
  rc.style.animation='none'; void rc.offsetWidth; rc.style.animation='popIn 0.35s cubic-bezier(0.34,1.56,0.64,1)';

  document.getElementById('rName').textContent=m.name;
  const rCat=document.getElementById('rCat');
  rCat.textContent=m.category;
  rCat.className=`r-cat card-cat ${catCls}`;
  const strIcon=m.strength==='лёгкий'?'🍃':m.strength==='крепкий'?'💀':'🔥';
  document.getElementById('rStrength').innerHTML=`<span class="strength-badge str-${m.strength}">${strIcon} ${m.strength}</span>`;
  document.getElementById('rDesc').textContent=m.description;
  document.getElementById('randomSplash').classList.add('show');
}
function closeRandom(){
  document.getElementById('randomSplash').classList.remove('show');
}
function openFromRandom(){
  closeRandom();
  if(currentRandomId) openModal(currentRandomId);
}

// ── MODAL ──
async function openModal(id){
  const m=mixes.find(x=>x.id===id);if(!m)return;
  selectedBowl=m.recommended_bowl;selectedRating=0;
  const revRes=await fetch(`/api/reviews/${id}`);
  const reviews=await revRes.json();
  const modal=document.getElementById('modal');
  const catCls='cat-'+m.category.toLowerCase().replace(/[- ]/g,'-');
  let coalHtml='';
  if(m.coal_tip){
    const parts=m.coal_tip.split('→');
    const heat=parts[0]?parts[0].replace('Прогрев:','').trim():'';
    const smoke=parts[1]?parts[1].replace('Курить:','').trim():'';
    coalHtml=`<div class="modal-coal-tip">
      <div class="coal-title">🪨 Угли (25мм)</div>
      ${heat?`<div class="coal-row"><span class="coal-label">Прогрев:</span><span class="coal-val">${heat}</span></div>`:''}
      ${smoke?`<div class="coal-row"><span class="coal-label">Курить:</span><span class="coal-val">${smoke}</span></div>`:''}
    </div>`;
  }
  modal.innerHTML=`
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div class="modal-header">
      <h2>${m.name} <span class="card-cat ${catCls}" style="font-size:0.7rem;vertical-align:middle;margin-left:8px">${m.category}</span></h2>
      <p>${m.description}</p>
    </div>
    <div class="modal-bowl-note">${m.bowl_note}</div>
    ${coalHtml}
    ${m.pack_method?`<div class="modal-coal-tip" style="border-left-color:#818cf8;background:rgba(129,140,248,0.06);margin-top:${coalHtml?'0.5rem':'0.75rem'}">
      <div class="coal-title" style="color:#a5b4fc">${packIcon(m.pack_method)} Набивка чаши</div>
      <div class="coal-row"><span class="coal-label">Метод:</span><span class="coal-val">${m.pack_method.charAt(0).toUpperCase()+m.pack_method.slice(1)}</span></div>
      <div class="coal-row"><span class="coal-label">Как:</span><span class="coal-val" style="color:var(--text2)">${packHint(m.pack_method)}</span></div>
    </div>`:''}
    <div class="modal-items">${m.items.map((it,i)=>{
      const g20=Math.round(20*it.percentage/100*10)/10;
      const g15=Math.round(15*it.percentage/100*10)/10;
      return `<div class="modal-item">
        <span class="pct" style="color:${barColors[i%barColors.length]}">${it.percentage}%</span>
        <div class="bar" style="background:${barColors[i%barColors.length]};width:${it.percentage}px"></div>
        <div class="info"><div class="tname">${it.tobacco_name}</div><div class="tbrand">${it.brand}${it.pack_grams>0?' · '+it.pack_grams+'г пачка':' · дома'}</div></div>
        <span class="grams">${g20}г / ${g15}г</span>
      </div>`;
    }).join('')}</div>
    <div style="padding:0 1.5rem;font-size:0.78rem;color:var(--text3)">Граммовки: убивашка / фанел</div>
    <div class="review-section">
      <h3>Оставить отзыв</h3>
      <div class="review-form">
        <div class="form-row">
          <div>
            <div style="font-size:0.8rem;color:var(--text2);margin-bottom:6px">Чаша:</div>
            <div class="bowl-select">
              <button class="bowl-opt ${selectedBowl==='убивашка'?'selected':''}" onclick="selBowl('убивашка',this)">Убивашка</button>
              <button class="bowl-opt ${selectedBowl==='фанел'?'selected':''}" onclick="selBowl('фанел',this)">Фанел</button>
            </div>
          </div>
          <div>
            <div style="font-size:0.8rem;color:var(--text2);margin-bottom:6px">Оценка:</div>
            <div class="stars-input" id="starsInput">${[1,2,3,4,5].map(n=>`<span onclick="selRating(${n})" onmouseover="hoverRating(${n})" onmouseout="resetRating()">&#9733;</span>`).join('')}</div>
          </div>
        </div>
        <div>
          <div style="font-size:0.8rem;color:var(--text2);margin-bottom:6px">Когда курил:</div>
          <input type="date" id="smokedAt" value="${new Date().toISOString().slice(0,10)}" style="padding:8px 12px;background:var(--bg3);border:1px solid rgba(255,255,255,0.08);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:0.85rem;outline:none;width:100%;transition:border-color 0.2s" onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='rgba(255,255,255,0.08)'">
        </div>
        <textarea id="reviewComment" placeholder="Как тебе микс? Расскажи..."></textarea>
        <button class="submit-btn" onclick="submitReview(${m.id})">Отправить отзыв</button>
      </div>
      <div class="existing-reviews">${reviews.length?reviews.map(r=>`
        <div class="rev-card">
          <div class="rev-top">
            <span class="rev-bowl ${r.bowl_type}">${r.bowl_type}</span>
            <span class="rev-date">${r.smoked_at?'🚬 '+r.smoked_at:r.date}</span>
          </div>
          <div class="rev-stars">${'&#9733;'.repeat(r.rating)}</div>
          ${r.comment?`<div class="rev-comment">${r.comment}</div>`:''}
        </div>`).join(''):'<div style="color:var(--text3);font-size:0.85rem">Пока нет отзывов. Будь первым!</div>'}</div>
    </div>`;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow='';
}
function selBowl(b,el){
  selectedBowl=b;
  el.parentElement.querySelectorAll('.bowl-opt').forEach(x=>x.classList.remove('selected'));
  el.classList.add('selected');
}
function selRating(n){selectedRating=n;updateStars(n)}
function hoverRating(n){updateStars(n)}
function resetRating(){updateStars(selectedRating)}
function updateStars(n){
  document.querySelectorAll('#starsInput span').forEach((s,i)=>s.classList.toggle('lit',i<n));
}
async function submitReview(mixId){
  if(!selectedBowl||!selectedRating){alert('Выбери чашу и оценку!');return}
  const comment=document.getElementById('reviewComment').value;
  const smoked_at=document.getElementById('smokedAt').value||null;
  const btn=document.querySelector('.submit-btn');
  btn.disabled=true;btn.textContent='Отправляю...';
  try{
    await fetch('/api/reviews',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mix_id:mixId,bowl_type:selectedBowl,rating:selectedRating,comment,smoked_at})});
    showToast();
    const r=await fetch('/api/mixes');mixes=await r.json();renderGrid();updateRandCount();
    openModal(mixId);
    await loadCalendar();
  }catch(e){alert('Ошибка: '+e.message)}
}
function showToast(){
  const t=document.getElementById('toast');t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeModal();closeRandom();}
});

// ── PAGE SWITCHING ──
function showPage(page,el){
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('mixesPage').style.display=page==='mixes'?'block':'none';
  document.getElementById('calPage').style.display=page==='calendar'?'block':'none';
  if(page==='calendar') renderCalendar();
}

// ── CALENDAR ──
let calYear=new Date().getFullYear(),calMonth=new Date().getMonth();
let calData=[];
async function loadCalendar(){
  const r=await fetch('/api/calendar');
  calData=await r.json();
}
function calMove(dir){
  calMonth+=dir;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  renderCalendar();
}
function renderCalendar(){
  const months=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
  document.getElementById('calMonthLabel').textContent=months[calMonth]+' '+calYear;
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const startOffset=(firstDay+6)%7;
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const daysInPrev=new Date(calYear,calMonth,0).getDate();
  const today=new Date();
  const byDate={};
  calData.forEach(e=>{
    if(!byDate[e.smoked_at]) byDate[e.smoked_at]=[];
    byDate[e.smoked_at].push(e);
  });
  const dows=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
  let html=dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  const totalCells=Math.ceil((startOffset+daysInMonth)/7)*7;
  for(let i=0;i<totalCells;i++){
    let day,month=calMonth,year=calYear,otherMonth=false;
    if(i<startOffset){day=daysInPrev-startOffset+i+1;month=calMonth-1;otherMonth=true;}
    else if(i>=startOffset+daysInMonth){day=i-startOffset-daysInMonth+1;month=calMonth+1;otherMonth=true;}
    else{day=i-startOffset+1;}
    if(month<0){month=11;year=calYear-1;}
    if(month>11){month=0;year=calYear+1;}
    const dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const entries=byDate[dateStr]||[];
    const isToday=day===today.getDate()&&month===today.getMonth()&&year===today.getFullYear();
    const cls=['cal-cell',otherMonth?'other-month':'',isToday?'today':'',entries.length?'has-entry':''].filter(Boolean).join(' ');
    const entriesHtml=entries.map(e=>{
      const strIcon=e.strength==='лёгкий'?'🍃':e.strength==='крепкий'?'💀':'🔥';
      return `<div class="cal-entry" onclick="openModal(${e.mix_id});event.stopPropagation()">
        <div class="cal-entry-name">${e.name}</div>
        <div class="cal-entry-meta"><span>${strIcon}</span><span style="color:var(--amber);font-size:0.65rem">${'★'.repeat(e.rating)}</span></div>
      </div>`;
    }).join('');
    html+=`<div class="${cls}"><div class="cal-day-num">${day}</div>${entriesHtml}</div>`;
  }
  document.getElementById('calGrid').innerHTML=html;
}

load();
</script>
</body>
</html>
